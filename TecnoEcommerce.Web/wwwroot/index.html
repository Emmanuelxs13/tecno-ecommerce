<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TecnoEcommerce — Tecnología para tu vida</title>
    <meta
      name="description"
      content="Descubre laptops, smartphones, accesorios gaming y más. Envío gratis, garantía oficial y la mejor experiencia de compra en tecnología."
    />
    <meta name="theme-color" content="#1d1d1f" />
    <meta
      property="og:title"
      content="TecnoEcommerce — Tecnología para tu vida"
    />
    <meta
      property="og:description"
      content="Laptops, smartphones, gaming y accesorios. Los mejores precios con envío gratis."
    />
    <meta property="og:type" content="website" />
    <base href="/" />

    <!-- Bootstrap 5 — Framework CSS principal -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!-- Bootstrap Icons — conjunto de íconos SVG oficiales de Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <!-- Estilos personalizados de la aplicación -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="TecnoEcommerce.Web.styles.css" rel="stylesheet" />
  </head>

  <body>
    <!-- Contenedor raíz de la aplicación Blazor -->
    <div id="app">
      <!-- Pantalla de carga que se muestra mientras Blazor inicializa el WASM -->
      <div
        class="d-flex justify-content-center align-items-center vh-100 bg-light"
      >
        <div class="text-center">
          <div
            class="spinner-border text-primary mb-3"
            style="width: 3rem; height: 3rem"
            role="status"
          >
            <span class="visually-hidden">Cargando...</span>
          </div>
          <h5 class="text-muted">Cargando TecnoEcommerce...</h5>
        </div>
      </div>
    </div>

    <!-- Panel de error global de Blazor -->
    <div
      id="blazor-error-ui"
      class="alert alert-danger m-3 d-none"
      role="alert"
    >
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      Ocurrió un error inesperado.
      <a href="." class="alert-link ms-2">Recargar</a>
      <button
        type="button"
        class="btn-close float-end dismiss"
        aria-label="Cerrar"
      ></button>
    </div>

    <!-- Bootstrap 5 JS (necesario para componentes interactivos como dropdowns y modals) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmM8Sq3JZLJPWPElcijjK3A0X6X4"
      crossorigin="anonymous"
    ></script>

    <!-- Utilidades JS expuestas a Blazor via IJSRuntime -->
    <script>
      // Cierra el collapse del navbar en pantallas móviles (Bootstrap 5)
      window.cerrarNavbarMovil = function () {
        const nav = document.getElementById("navPrincipal");
        if (nav && nav.classList.contains("show")) {
          const bsCollapse = bootstrap.Collapse.getInstance(nav);
          if (bsCollapse) bsCollapse.hide();
        }
      };
    </script>

    <!-- Motor del lado del cliente de Blazor WebAssembly -->
    <script src="_framework/blazor.webassembly.js"></script>
  </body>
</html>
